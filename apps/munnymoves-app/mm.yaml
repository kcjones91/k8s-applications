apiVersion: v1
kind: Namespace
metadata:
  name: munnymoves-app
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: munnymoves-app
  namespace: munnymoves-app
  labels:
    app: munnymoves-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: munnymoves-app
  template:
    metadata:
      labels:
        app: munnymoves-app
    spec:
      # If the GHCR package is private, create an imagePullSecret named
      # ghcr-pull in this namespace and uncomment:
      # imagePullSecrets:
      #   - name: ghcr-pull
      containers:
        - name: munnymoves-app
          # CD updates this tag on every push to main.
          # Start with :latest; the first pipeline run rewrites it to sha-<commit>.
          image: ghcr.io/kcjones91/app-munnymoves:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 192Mi
          livenessProbe:
            httpGet:
              path: /api/health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /api/health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: munnymoves-app
  namespace: munnymoves-app
spec:
  type: NodePort
  selector:
    app: munnymoves-app
  ports:
    - port: 8000
      targetPort: 8000
      nodePort: 30810
