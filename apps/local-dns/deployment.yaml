apiVersion: v1
kind: Namespace
metadata:
  name: dns
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: coredns-local
  namespace: dns
data:
  Corefile: |
    swipe.local:53 {
      hosts {
        192.168.1.224 chat.swipe.local
        192.168.1.224 argocd.swipe.local
        192.168.1.224 ollama.swipe.local
        192.168.1.224 hubble.swipe.local
        fallthrough
      }
      reload
    }
    .:53 {
      forward . 8.8.8.8 8.8.4.4
      cache 30
      reload
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: coredns-local
  namespace: dns
spec:
  replicas: 1
  selector:
    matchLabels:
      app: coredns-local
  template:
    metadata:
      labels:
        app: coredns-local
    spec:
      hostNetwork: true
      nodeSelector:
        kubernetes.io/hostname: swipe-worker-1
      containers:
      - name: coredns
        image: coredns/coredns:latest
        args: ["-conf", "/etc/coredns/Corefile"]
        ports:
        - containerPort: 53
          protocol: UDP
        - containerPort: 53
          protocol: TCP
        volumeMounts:
        - name: config
          mountPath: /etc/coredns
      volumes:
      - name: config
        configMap:
          name: coredns-local
