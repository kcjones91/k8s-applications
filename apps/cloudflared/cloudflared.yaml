apiVersion: v1
kind: Namespace
metadata:
  name: cloudflared
---
apiVersion: v1
kind: Secret
metadata:
  name: cloudflared-token
  namespace: cloudflared
type: Opaque
stringData:
  # Paste your tunnel token here, replacing the placeholder.
  # Get it from Cloudflare Zero Trust → Networks → Tunnels → swipe-lab → Configure
  token: "eyJhIjoiMTdiZjg0ZWE3YmQwODFjMGFmYWVhN2QzZTU5NGFkZTMiLCJ0IjoiN2YxMTMxNTMtYjQ4ZS00MjBmLTgyM2QtZDMzOGM2MjgwNGU4IiwicyI6Ik56QXdaalE0TmpVdFpEZ3dOQzAwWlRVeUxXRm1Oek10TldNeU9HTmpNekE0WmpCaCJ9"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloudflared
  namespace: cloudflared
  labels:
    app: cloudflared
spec:
  replicas: 2
  selector:
    matchLabels:
      app: cloudflared
  template:
    metadata:
      labels:
        app: cloudflared
    spec:
      containers:
        - name: cloudflared
          image: cloudflare/cloudflared:latest
          args:
            - tunnel
            - --no-autoupdate
            - run
            - --token
            - $(TUNNEL_TOKEN)
          env:
            - name: TUNNEL_TOKEN
              valueFrom:
                secretKeyRef:
                  name: cloudflared-token
                  key: token
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          livenessProbe:
            httpGet:
              path: /ready
              port: 2000
            failureThreshold: 1
            initialDelaySeconds: 10
            periodSeconds: 10
