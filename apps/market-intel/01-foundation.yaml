# Market Intel — cluster foundation: namespace, Postgres (pgvector), secrets.
# Mirrors your vllm deployment patterns: local-path PVC, Recreate, probes.
---
apiVersion: v1
kind: Namespace
metadata:
  name: market-intel
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: pg-data
  namespace: market-intel
spec:
  accessModes: ["ReadWriteOnce"]
  storageClassName: local-path
  resources:
    requests:
      storage: 10Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: market-intel
  labels: { app: postgres }
spec:
  replicas: 1
  strategy: { type: Recreate }
  selector:
    matchLabels: { app: postgres }
  template:
    metadata:
      labels: { app: postgres }
    spec:
      containers:
        - name: postgres
          image: pgvector/pgvector:pg16
          env:
            - name: POSTGRES_USER
              value: intel
            - name: POSTGRES_DB
              value: market_intel
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef: { name: market-intel-secrets, key: POSTGRES_PASSWORD }
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          ports:
            - { name: pg, containerPort: 5432 }
          volumeMounts:
            - { name: data, mountPath: /var/lib/postgresql/data }
          readinessProbe:
            exec: { command: ["pg_isready", "-U", "intel", "-d", "market_intel"] }
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests: { cpu: "250m", memory: 512Mi }
            limits: { memory: 2Gi }
      volumes:
        - name: data
          persistentVolumeClaim: { claimName: pg-data }
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: market-intel
spec:
  selector: { app: postgres }
  ports:
    - { name: pg, port: 5432, targetPort: 5432 }
