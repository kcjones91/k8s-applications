apiVersion: v1
kind: Namespace
metadata:
  name: vivian-portfolio
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: vivian-portfolio-media
  namespace: vivian-portfolio
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: local-path
  resources:
    requests:
      storage: 10Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vivian-portfolio
  namespace: vivian-portfolio
  labels:
    app: vivian-portfolio
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vivian-portfolio
  template:
    metadata:
      labels:
        app: vivian-portfolio
    spec:
      nodeSelector:
        kubernetes.io/hostname: swipe-worker-1
      containers:
        - name: nginx
          image: ghcr.io/kcjones91/vivian-portfolio:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80
          volumeMounts:
            - name: media
              mountPath: /usr/share/nginx/html/media
          resources:
            requests:
              cpu: 50m
              memory: 32Mi
            limits:
              cpu: 200m
              memory: 128Mi
      volumes:
        - name: media
          persistentVolumeClaim:
            claimName: vivian-portfolio-media
---
apiVersion: v1
kind: Service
metadata:
  name: vivian-portfolio
  namespace: vivian-portfolio
spec:
  type: NodePort
  selector:
    app: vivian-portfolio
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30900
